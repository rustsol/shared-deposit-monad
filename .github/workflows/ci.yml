# CI skeleton (Phase 1). Jobs grow with each phase:
# - backend gains a MySQL service and an Alembic migration check once migrations exist (Phase 4);
# - an end-to-end job against a local Hardhat node arrives in Phase 8.
# CI never requires a private key or a live-chain transaction.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      # Generated ABI modules in frontend/backend must match the compiled artifact.
      - run: node scripts/sync-artifacts.mjs --check
      - run: npm test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # mysql:8.4 is the current LTS tag; the schema (utf8mb4, DATETIME(6),
      # JSON, DECIMAL(65,0), CHECK-free InnoDB) is compatible with 8.0+ and the
      # local WAMP 9.1 server. The password below is CI-container-only, never
      # blank, and never a production credential.
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ci-only-root-pw
          MYSQL_DATABASE: shared_deposit_ci
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pci-only-root-pw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql+pymysql://root:ci-only-root-pw@127.0.0.1:3306/shared_deposit_ci?charset=utf8mb4
      TEST_DATABASE_URL: mysql+pymysql://root:ci-only-root-pw@127.0.0.1:3306/shared_deposit_ci_test?charset=utf8mb4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
      - name: Migrate application database and verify head
        run: |
          python -m app.database.setup
          python -m alembic upgrade head
          python -m alembic current | grep "(head)"
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
